# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI

on:
  push:
    paths-ignore:
      - 'images/**'
      - 'docs/**'
      - 'examples/**'
      - 'packages/**'
      - 'README.md'
    branches: [ master ]
  pull_request:
    paths-ignore:
      - 'images/**'
      - 'docs/**'
      - 'examples/**'
      - 'packages/**'
      - 'README.md'
    branches: [ master ]

jobs:
  build:
    # Use Windows runner so .NET Framework 4.8 developer packs / reference assemblies are available
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_DISABLE_GUI_ERRORS: 1
      DOTNET_GENERATE_ASPNET_CERTIFICATE: 0
      DOTNET_NOLOGO: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        include-prerelease: false

    - name: Restore
      run: dotnet restore -p:Configuration=Release

    - name: Build
      run: |
        dotnet build -c Release --no-restore -p:SourceRevisionId=$(git rev-parse --short $Env:GITHUB_SHA)

    - name: Test
      run: dotnet test -c Release --no-restore --no-build --verbosity normal