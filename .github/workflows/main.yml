# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI

on:
  push:
    paths-ignore:
      - 'images/**'
      - 'docs/**'
      - 'examples/**'
      - 'packages/**'
      - 'README.md'
    branches: [ master ]
  pull_request:
    paths-ignore:
      - 'images/**'
      - 'docs/**'
      - 'examples/**'
      - 'packages/**'
      - 'README.md'
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_DISABLE_GUI_ERRORS: 1
      DOTNET_GENERATE_ASPNET_CERTIFICATE: 0
      DOTNET_NOLOGO: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        include-prerelease: false

    - name: Setup Nuget for .NET Framework Reference Assemblies
      run: |
        dotnet add examples/UsageExample3/UsageExample3.csproj package Microsoft.NETFramework.ReferenceAssemblies --version 1.0.3

    - name: Restore
      run: dotnet restore -p:Configuration=Release

    - name: Build
      run: |
        dotnet build -c Release --no-restore -p:SourceRevisionId=$(git rev-parse --short $GITHUB_SHA)

    - name: Test
      run: | 
        dotnet test -c Release --no-restore --no-build --verbosity normal