# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: CI

on:
  push:
    branches:
      - master
      - main
      - 'feature/**'
    tags:
      - '*'
    paths-ignore:
      - 'images/**'
      - 'docs/**'
      - 'examples/**'
      - 'packages/**'
      - 'README.md'
  pull_request:
    branches:
      - master
      - main
      - 'feature/**'
    paths-ignore:
      - 'images/**'
      - 'docs/**'
      - 'examples/**'
      - 'packages/**'
      - 'README.md'
  workflow_dispatch: {}

jobs:
  build-sdk:
    name: Build (SDK projects) � Ubuntu
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          include-prerelease: false

      - name: Restore and build SDK-style projects only
        run: |
          set -e
          echo "Finding SDK-style projects..."
          mapfile -t sdk_projects < <(grep -rl --null --exclude-dir=packages '<Project Sdk=' --include='*.csproj' . | tr '\0' '\n' || true)
          if [ ${#sdk_projects[@]} -eq 0 ]; then
            echo "No SDK-style projects found. Skipping SDK job."
            exit 0
          fi
          echo "Found SDK projects:"
          printf '%s\n' "${sdk_projects[@]}"
          for proj in "${sdk_projects[@]}"; do
            echo "Restoring $proj"
            dotnet restore "$proj" -p:Configuration=Release
            echo "Building $proj"
            dotnet build "$proj" -c Release --no-restore
          done

      - name: Run tests for SDK-style test projects
        run: |
          set -e
          # Run dotnet test on projects that look like test projects
          mapfile -t sdk_projects < <(grep -rl --null --exclude-dir:packages '<Project Sdk=' --include='*.csproj' . | tr '\0' '\n' || true)
          for proj in "${sdk_projects[@]}"; do
            if grep -q '<IsTestProject>true</IsTestProject>' "$proj" 2>/dev/null || echo "$proj" | grep -qi 'test'; then
              echo "Testing $proj"
              dotnet test "$proj" -c Release --no-build --no-restore --verbosity normal || true
            fi
          done

  build-legacy:
    name: Build (Legacy .NET Framework) � Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          include-prerelease: false

      - name: Setup NuGet CLI
        uses: NuGet/setup-nuget@v2

      - name: Restore packages.config packages (NuGet)
        run: |
          nuget restore

      - name: Restore & build all projects (including legacy)
        run: |
          $ErrorActionPreference = 'Stop'
          $csprojs = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -ExpandProperty FullName
          foreach ($p in $csprojs) {
            Write-Host "Restoring $p"
            dotnet restore $p -p:Configuration=Release
            Write-Host "Building $p"
            dotnet build $p -c Release --no-restore
          }

      - name: Run tests (legacy/test projects)
        run: |
          $ErrorActionPreference = 'Continue'
          $csprojs = Get-ChildItem -Recurse -Filter *.csproj | Select-Object -ExpandProperty FullName
          foreach ($p in $csprojs) {
            $isTest = Select-String -Path $p -Pattern '<IsTestProject>true</IsTestProject>' -Quiet
            if ($isTest -or ($p -match '(?i)test')) {
              Write-Host "Running tests for $p"
              dotnet test $p -c Release --no-build --no-restore --verbosity normal
            }
          }