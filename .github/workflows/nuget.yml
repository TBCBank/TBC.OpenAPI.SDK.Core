# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: NuGet

on:
  push:
    paths-ignore:
      - 'images/**'
      - 'docs/**'
      - 'examples/**'
      - 'packages/**'
      - 'README.md'
    tags:
      - '**'

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_DISABLE_GUI_ERRORS: 1
      DOTNET_GENERATE_ASPNET_CERTIFICATE: 0
      DOTNET_NOLOGO: 1
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        fetch-depth: 10

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
        include-prerelease: false

    - name: Setup NuGet.exe
      uses: NuGet/setup-nuget@v2
      with:
        nuget-api-key: ${{ secrets.NUGET_API_KEY }}
        nuget-version: latest
        nuget-api-key-source: 'https://api.nuget.org/v3/index.json'

    - name: Remove net framework example project
      run: dotnet sln remove "examples\UsageExample3\UsageExample3.csproj"

    - name: Restore .NET Framework 4.8 Projects
      run: |
        dotnet restore "src\TBC.OpenAPI.SDK.Core\TBC.OpenAPI.SDK.Core.csproj" -p:Configuration=Release
        dotnet restore "examples\UsageExample3\UsageExample3.csproj" -p:Configuration=Release

    - name: Build .NET Framework 4.8 Projects
      run: |
        msbuild "src\TBC.OpenAPI.SDK.Core\TBC.OpenAPI.SDK.Core.csproj" /p:Configuration=Release /p:TargetFrameworkVersion=v4.8 /p:SourceRevisionId=$(git rev-parse --short $env:GITHUB_SHA)
        msbuild "examples\UsageExample3\UsageExample3.csproj" /p:Configuration=Release /p:TargetFrameworkVersion=v4.8

    - name: Test .NET Framework 4.8 Projects
      run: dotnet test "src\TBC.OpenAPI.SDK.Core\TBC.OpenAPI.SDK.Core.csproj" -c Release --no-restore --no-build --verbosity normal

    - name: Push TBC.OpenAPI.SDK.Core
      run: nuget push "src\TBC.OpenAPI.SDK.Core\bin\Release\*.nupkg" -NonInteractive -SkipDuplicate -Source "https://api.nuget.org/v3/index.json" -NoSymbols -ForceEnglishOutput

    - name: Push TBC.OpenAPI.SDK.ExampleClient
      run: nuget push "examples\TBC.OpenAPI.SDK.ExampleClient\bin\Release\*.nupkg" -NonInteractive -SkipDuplicate -Source "https://api.nuget.org/v3/index.json" -NoSymbols -ForceEnglishOutput
